name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-typecheck:
    name: Backend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: esimlaunch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/esimlaunch_test
      # Dummy values required by config/env.ts during service imports.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/esimlaunch_test
      JWT_SECRET: test-jwt-secret-please-change
      ESIM_ACCESS_ACCESS_CODE: test
      ESIM_ACCESS_SECRET_KEY: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  frontend-typecheck:
    name: Frontend typecheck + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esim-connect-hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: esim-connect-hub/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
