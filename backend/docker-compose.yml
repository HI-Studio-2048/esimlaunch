version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: esimlaunch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: esimlaunch
      POSTGRES_PASSWORD: esimlaunch_password
      POSTGRES_DB: esimlaunch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:













